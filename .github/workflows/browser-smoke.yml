name: Browser Smoke Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  selenium-smoke:
    name: Selenium Smoke (${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
          - browser: edge
            os: ubuntu-latest
          - browser: firefox
            os: ubuntu-latest
          - browser: safari
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Enable Safari WebDriver
        if: matrix.browser == 'safari'
        run: safaridriver --enable || true

      - name: Start backend server
        working-directory: backend
        run: |
          mvn -B -Dspring-boot.run.useTestClasspath=true "-Dspring-boot.run.arguments=--spring.profiles.active=test --server.port=8081" spring-boot:run > ../backend.log 2>&1 &

      - name: Wait for backend
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8081 >/dev/null && curl -fsS http://127.0.0.1:8081/api/courses >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time."
          exit 1

      - name: Run Selenium smoke tests
        working-directory: backend
        run: |
          mvn -B -Dtest=CrossBrowserSmokeTest -Dbrowser=${{ matrix.browser }} -DbaseUrl=http://127.0.0.1:8081 test

      - name: Upload browser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ matrix.browser }}-logs
          path: |
            backend.log
