name: Browser Smoke Tests

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  selenium-smoke:
    name: Selenium Smoke (${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            os: ubuntu-latest
          - browser: edge
            os: ubuntu-latest
          - browser: firefox
            os: ubuntu-latest
          - browser: safari
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Set up Edge
        if: matrix.browser == 'edge'
        uses: browser-actions/setup-edge@v1

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Enable Safari WebDriver
        if: matrix.browser == 'safari'
        run: safaridriver --enable || true

      - name: Build backend jar
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Run Selenium smoke tests
        shell: bash
        run: |
          cd backend
          nohup java -Dspring.profiles.active=test -jar target/lead-service-0.0.1-SNAPSHOT.jar --server.port=8081 > ../backend.log 2>&1 &
          BACKEND_PID=$!
          trap "kill $BACKEND_PID || true" EXIT

          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:8081 >/dev/null && curl -fsS http://127.0.0.1:8081/api/courses >/dev/null; then
              for attempt in {1..5}; do
                echo "Selenium attempt ${attempt} of 5"
                if mvn -B -Dtest=CrossBrowserSmokeTest -Dbrowser=${{ matrix.browser }} -DbaseUrl=http://127.0.0.1:8081 test; then
                  exit 0
                fi
                if [ "$attempt" -lt 5 ]; then
                  echo "Selenium run failed, retrying after 5 seconds..."
                  sleep 5
                fi
              done
              echo "Selenium smoke tests failed after 5 attempts."
              exit 1
            fi
            sleep 2
          done

          echo "Backend did not become ready in time."
          tail -200 ../backend.log || true
          exit 1

      - name: Upload browser logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-${{ matrix.browser }}-logs
          path: |
            backend.log
