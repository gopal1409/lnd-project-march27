name: DevSecOps CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit and web tests
        run: mvn -B clean verify

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gacts/gitleaks@v1.3.1
        with:
          fail-on-error: false

      - name: Upload Gitleaks SARIF
        if: always() && steps.gitleaks.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.gitleaks.outputs.sarif }}
          category: gitleaks

  frontend-container-checks:
    name: Frontend Container Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build frontend image
        run: docker build -t learnsphere-frontend:${{ github.sha }} .

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: v0.69.3
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: image
          image-ref: learnsphere-frontend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Report frontend image critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: image
          image-ref: learnsphere-frontend:${{ github.sha }}
          scanners: vuln
          format: table
          output: trivy-frontend-critical.txt
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Add frontend Trivy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Frontend Trivy Summary"
            echo
            if [ -f trivy-frontend-critical.txt ]; then
              echo '```text'
              cat trivy-frontend-critical.txt
              echo '```'
            else
              echo "No frontend Trivy summary file was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-frontend-fs

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-frontend-image

      - name: Upload frontend Trivy text report
        if: always() && hashFiles('trivy-frontend-critical.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-critical-report
          path: trivy-frontend-critical.txt

  backend-container-checks:
    name: Backend Container Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t learnsphere-backend:${{ github.sha }} -f backend/Dockerfile .

      - name: Run Trivy backend image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: v0.69.3
          scan-type: image
          image-ref: learnsphere-backend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-backend-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Report backend image critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: true
          scan-type: image
          image-ref: learnsphere-backend:${{ github.sha }}
          scanners: vuln
          format: table
          output: trivy-backend-critical.txt
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Add backend Trivy summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Backend Trivy Summary"
            echo
            if [ -f trivy-backend-critical.txt ]; then
              echo '```text'
              cat trivy-backend-critical.txt
              echo '```'
            else
              echo "No backend Trivy summary file was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-backend-image.sarif') != ''
        with:
          sarif_file: trivy-backend-image.sarif
          category: trivy-backend-image

      - name: Upload backend Trivy text report
        if: always() && hashFiles('trivy-backend-critical.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-critical-report
          path: trivy-backend-critical.txt

  dast-zap:
    name: DAST Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start application stack
        run: docker compose up -d --build

      - name: Wait for frontend and backend
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1/ >/dev/null && curl -fsS http://127.0.0.1:8081/api/courses >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Application did not become ready in time."
          docker compose ps
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://127.0.0.1/'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          cmd_options: '-a'
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-report

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop application stack
        if: always()
        run: docker compose down -v

  dockerhub-config:
    name: Docker Hub Config Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      has_credentials: ${{ steps.check.outputs.has_credentials }}
    steps:
      - name: Check Docker Hub secrets
        id: check
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

  dockerhub-secrets-notice:
    name: Docker Hub Secrets Notice
    runs-on: ubuntu-latest
    needs:
      - dockerhub-config
    if: github.event_name == 'push' && needs.dockerhub-config.outputs.has_credentials != 'true'
    steps:
      - name: Add workflow summary notice
        shell: bash
        run: |
          {
            echo "## Docker Hub Publish Skipped"
            echo
            echo "The \`publish-images\` job was skipped because one or both Docker Hub secrets are missing."
            echo
            echo "Required repository secrets:"
            echo "- \`DOCKERHUB_USERNAME\`"
            echo "- \`DOCKERHUB_TOKEN\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - gitleaks
      - frontend-container-checks
      - backend-container-checks
      - dast-zap
      - dockerhub-config
    if: github.event_name == 'push' && needs.dockerhub-config.outputs.has_credentials == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: learnsphere-frontend
            context: .
            file: ./Dockerfile
          - image_name: learnsphere-backend
            context: .
            file: ./backend/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate Docker Hub secrets
        run: |
          echo "Docker Hub publishing enabled for user: ${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Normalize Docker Hub namespace
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          namespace="$(echo "$DOCKERHUB_USERNAME" | tr '[:upper:]' '[:lower:]' | xargs)"
          if [ -z "$namespace" ]; then
            echo "Docker Hub username is empty after normalization."
            exit 1
          fi
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: v3.0.3

      - name: Sign image with Cosign
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images="${images}${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
