name: DevSecOps CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit and web tests
        run: mvn -B clean verify

  frontend-container-checks:
    name: Frontend Container Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build frontend image
        run: docker build -t learnsphere-frontend:${{ github.sha }} .

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: learnsphere-frontend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce frontend image security gate
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: learnsphere-frontend:${{ github.sha }}
          scanners: vuln
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-frontend-fs

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-frontend-image

  backend-container-checks:
    name: Backend Container Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t learnsphere-backend:${{ github.sha }} ./backend

      - name: Run Trivy backend image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: learnsphere-backend:${{ github.sha }}
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-backend-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce backend image security gate
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: learnsphere-backend:${{ github.sha }}
          scanners: vuln
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-backend-image.sarif') != ''
        with:
          sarif_file: trivy-backend-image.sarif
          category: trivy-backend-image
