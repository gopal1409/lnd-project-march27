services:
  mysql:
    image: mysql:8.0-bookworm
    container_name: learnsphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: learnsphere
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnsphere-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/learnsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnsphere-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - backend

volumes:
  mysql_data:
