spring.application.name=lead-service
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/learnsphere}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

admin.email=${ADMIN_EMAIL:admin@learnsphere.com}
admin.password=${ADMIN_PASSWORD:Admin@123}
admin.token=${ADMIN_TOKEN:learnsphere-admin-token}
admin.console.username=${ADMIN_CONSOLE_USERNAME:admin}
admin.console.password=${ADMIN_CONSOLE_PASSWORD:Admin@123}
